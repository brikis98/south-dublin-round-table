<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<title>{{ page.title }}</title>
<meta name="description" content="{{ page.description }}">
<meta name="keywords" content="{{ page.keywords }}">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="{% include canonical-url.html %}">
{% include favicon.html %}
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="{{ page.title }}" />
<meta name="twitter:url" content="{% include canonical-url.html %}" />
<meta name="twitter:description" content="{{ page.description }}" />
<meta name="twitter:image" content="{{ page.image }}" />
<meta property="og:title" content="{{ page.title }}"/>
<meta property="og:url" content="{% include canonical-url.html %}"/>
<meta property="og:site_name" content="{{ page.title }}"/>
<meta property="article:author" content="{{ site.facebook_url }}"/>
<meta property="og:description" content="{{ page.description }}"/>
<meta property="og:image" content="{{ page.image }}"/>
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
