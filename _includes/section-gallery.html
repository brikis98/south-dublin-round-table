<section class="py4 bg-tan" id="events">
  <div class="max-width-4 mx-auto p4">
    <h2 class="mt0 mb2 dark-blue font-playfair">Recent Events</h2>
    <p>
      See the photos from all our events on <a href="{{ site.instagram_url }}" target="_blank">Instagram</a> and
      <a href="{{ site.facebook_url }}" target="_blank">Facebook</a>.
    </p>
    <div class="clearfix mxn2">
      {% for event in site.data.events %}
        <div class="sm-col sm-col-4 px2">
          <a href="{{ event.link }}" target="_blank" class="block bg-white rounded shadow text-decoration-none">
            <img src="/assets/img/events/{{ event.image }}" alt="{{ event.name }}" class="fit" loading="lazy">
            <p class="mt0 center pb1 dark-blue">{{ event.name }}</p>
          </a>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
